{% extends "base.html" %}

{% block title %}Placement Portal Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-lg-5">
                <div class="row g-4 align-items-center">
                    <div class="col-lg-5">
                        <span class="badge text-bg-primary mb-3">Welcome Back</span>
                        <h1 class="h3 mb-3">Sign in to your portal</h1>
                        <p class="text-secondary mb-0">Track applications, manage drives, and keep placements moving without a cluttered interface.</p>
                    </div>
                    <div class="col-lg-7">
                        <form method="POST" action="/login">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control form-control-lg" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control form-control-lg" required>
                            </div>
                            <button class="btn btn-primary btn-lg w-100">Login</button>
                        </form>
                        <div class="d-grid gap-2 d-sm-flex mt-4 pt-3 border-top">
                            <a class="btn btn-outline-primary flex-fill" href="/register/student">Student Register</a>
                            <a class="btn btn-outline-success flex-fill" href="/register/company">Company Register</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
