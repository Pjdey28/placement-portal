{% extends "base.html" %}

{% block title %}Company Registration{% endblock %}

{% block content %}
<div class="row justify-content-center">
	<div class="col-lg-8">
		<div class="card border-0 shadow-sm">
			<div class="card-body p-4 p-lg-5">
				<div class="d-flex justify-content-between align-items-start flex-column flex-md-row gap-3 mb-4">
					<div>
						<span class="badge text-bg-success mb-2">Company Account</span>
						<h1 class="h3 mb-1">Register your company</h1>
						<p class="text-secondary mb-0">Create a clean company profile so you can publish drives and review candidates.</p>
					</div>
					<a class="btn btn-outline-secondary" href="/">Back to Login</a>
				</div>
				<form method="POST">
					<div class="row g-3">
						<div class="col-md-6">
							<label class="form-label">Username</label>
							<input type="text" name="username" class="form-control" required>
						</div>
						<div class="col-md-6">
							<label class="form-label">Password</label>
							<input type="password" name="password" class="form-control" required>
						</div>
						<div class="col-md-6">
							<label class="form-label">Company Name</label>
							<input type="text" name="name" class="form-control" required>
						</div>
						<div class="col-md-6">
							<label class="form-label">HR Contact</label>
							<input type="number" name="hr_contact" class="form-control" required>
						</div>
						<div class="col-12">
							<label class="form-label">Website</label>
							<input type="text" name="website" class="form-control" placeholder="https://example.com">
						</div>
					</div>
					<div class="d-grid mt-4">
						<button class="btn btn-success btn-lg">Register</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
