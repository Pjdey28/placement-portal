{% extends "base.html" %}

{% block title %}Student Registration{% endblock %}

{% block content %}
<div class="row justify-content-center">
	<div class="col-lg-8">
		<div class="card border-0 shadow-sm">
			<div class="card-body p-4 p-lg-5">
				<div class="d-flex justify-content-between align-items-start flex-column flex-md-row gap-3 mb-4">
					<div>
						<span class="badge text-bg-primary mb-2">Student Account</span>
						<h1 class="h3 mb-1">Create your student profile</h1>
						<p class="text-secondary mb-0">Add your details and resume so companies can review your application properly.</p>
					</div>
					<a class="btn btn-outline-secondary" href="/">Back to Login</a>
				</div>
				<form method="POST" enctype="multipart/form-data">
					<div class="row g-3">
						<div class="col-md-6">
							<label class="form-label">Username</label>
							<input type="text" name="username" class="form-control" required>
						</div>
						<div class="col-md-6">
							<label class="form-label">Password</label>
							<input type="password" name="password" class="form-control" required>
						</div>
						<div class="col-md-6">
							<label class="form-label">Name</label>
							<input type="text" name="name" class="form-control" required>
						</div>
						<div class="col-md-6">
							<label class="form-label">Email</label>
							<input type="email" name="email" class="form-control" required>
						</div>
						<div class="col-12">
							<label class="form-label">Skills</label>
							<input type="text" name="skills" class="form-control" placeholder="Python, SQL, DSA, Communication">
						</div>
						<div class="col-12">
							<label class="form-label">Upload Resume (PDF)</label>
							<input type="file" name="resume" class="form-control" accept="application/pdf">
						</div>
					</div>
					<div class="d-grid mt-4">
						<button class="btn btn-primary btn-lg">Register</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
