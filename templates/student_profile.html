{% extends "base.html" %}

{% block title %}Student Profile{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
	<div>
		<h1 class="h3 mb-1">Edit Profile</h1>
		<p class="text-secondary mb-0">Update your personal details and keep your resume current.</p>
	</div>
	<a class="btn btn-outline-secondary" href="/student/dashboard">Back to Dashboard</a>
</div>

<div class="row g-4">
	<div class="col-lg-7">
		<div class="card border-0 shadow-sm h-100">
			<div class="card-body p-4">
				<h2 class="h5 mb-4">Profile Details</h2>
				<form method="POST">
					<div class="mb-3">
						<label class="form-label">Name</label>
						<input class="form-control" name="name" value="{{student.name}}">
					</div>
					<div class="mb-3">
						<label class="form-label">Email</label>
						<input class="form-control" name="email" value="{{student.email}}">
					</div>
					<div class="mb-3">
						<label class="form-label">Skills</label>
						<input class="form-control" name="skills" value="{{student.skills}}">
					</div>
					<div class="d-grid d-md-flex justify-content-md-end">
						<button class="btn btn-primary">Update Profile</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<div class="col-lg-5">
		<div class="card border-0 shadow-sm h-100">
			<div class="card-body p-4">
				<h2 class="h5 mb-4">Resume</h2>
				<form method="POST" action="/student/update_resume" enctype="multipart/form-data">
					<div class="mb-3">
						<label class="form-label">Upload Resume (PDF)</label>
						<input type="file" name="resume" class="form-control" accept="application/pdf">
					</div>
					<div class="d-grid gap-2">
						<button class="btn btn-success">Upload Resume</button>
						{% if student.resume %}
						<a class="btn btn-outline-primary" target="_blank" href="/static/uploads/{{student.resume}}">View Current Resume</a>
						{% endif %}
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
