<!DOCTYPE html>

<html>
<head>
<title>Student Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Edit Profile</h2>

<form method="POST">

<label>Name</label> <input class="form-control" name="name" value="{{student.name}}">

<br>

<label>Email</label> <input class="form-control" name="email" value="{{student.email}}">

<br>

<label>Skills</label> <input class="form-control" name="skills" value="{{student.skills}}">

<br>

<button class="btn btn-primary">
Update Profile
</button>

</form>

<hr>

<h3>Update Resume</h3>

<form method="POST"
action="/student/update_resume"
enctype="multipart/form-data">

<input type="file" name="resume">

<br><br>

<button class="btn btn-success">
Upload Resume
</button>

</form>

{% if student.resume %}

<br>

<a target="_blank"
href="/static/uploads/{{student.resume}}">
View Current Resume </a>

{% endif %}

<br><br>

<a class="btn btn-secondary" href="/student/dashboard">
Back
</a>

</body>
</html>
