<!DOCTYPE html>

<html>
<head>
<title>Applications</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Student Applications</h2>

<table class="table table-bordered">

<tr>
<th>Student</th>
<th>Skills</th>
<th>Resume</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for a in applications %}

<tr>

<td>{{ a.student.name }}</td>

<td>{{ a.student.skills }}</td>

<td>
<a target="_blank"
href="/static/uploads/{{a.student.resume}}">
View Resume
</a>
</td>

<td>{{ a.status }}</td>

<td>

<a class="btn btn-warning btn-sm"
href="/company/update_status/{{a.id}}/Shortlisted">
Shortlist </a>

<a class="btn btn-success btn-sm"
href="/company/update_status/{{a.id}}/Selected">
Select </a>

<a class="btn btn-danger btn-sm"
href="/company/update_status/{{a.id}}/Rejected">
Reject </a>

</td>

</tr>

{% endfor %}

</table>

</body>
</html>
