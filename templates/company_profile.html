{% extends "base.html" %}
{% block title %}Company Profile{% endblock %}

{% block content %}
<div class="card shadow-sm">
  <div class="card-body">
    <h3 class="mb-3">Edit Company Profile</h3>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Company Name</label>
        <input type="text" name="name" class="form-control" value="{{ company.name }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">HR Contact</label>
        <input type="number" name="hr_contact" class="form-control" value="{{ company.hr_contact }}" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Website</label>
        <input type="text" name="website" class="form-control" value="{{ company.website }}">
      </div>

      <button class="btn btn-success">Update Profile</button>
      <a href="/company/dashboard" class="btn btn-secondary">Back</a>
    </form>
  </div>
</div>
{% endblock %}
