<!DOCTYPE html>

<html>
<head>
<title>Company Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Company Dashboard</h2>

<h4>{{ company.name }}</h4>

<a class="btn btn-success mb-3" href="/company/create_drive">
Create Placement Drive
</a>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Job Title</th>
<th>Deadline</th>
<th>Status</th>
<th>Applications</th>
<th>Actions</th>
</tr>

{% for d in drives %}

<tr>

<td>{{ d.id }}</td>
<td>{{ d.title }}</td>
<td>{{ d.deadline }}</td>
<td>{{ d.status }}</td>

<td>
<a class="btn btn-primary btn-sm"
href="/company/applications/{{d.id}}">
View
</a>
</td>

<td>

<a class="btn btn-warning btn-sm"
href="/company/update_drive/{{d.id}}/Closed">
Close </a>

<a class="btn btn-success btn-sm"
href="/company/update_drive/{{d.id}}/Active">
Activate </a>

</td>

</tr>

{% endfor %}

</table>

<a href="/logout" class="btn btn-danger">Logout</a>

</body>
</html>
