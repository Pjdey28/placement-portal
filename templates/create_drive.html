{% extends "base.html" %}

{% block title %}Create Placement Drive{% endblock %}

{% block content %}
<div class="row justify-content-center">
	<div class="col-lg-8">
		<div class="card border-0 shadow-sm">
			<div class="card-body p-4 p-lg-5">
				<div class="d-flex justify-content-between align-items-start flex-column flex-md-row gap-3 mb-4">
					<div>
						<h1 class="h3 mb-1">Create Placement Drive</h1>
						<p class="text-secondary mb-0">Add the role, eligibility, and deadline before sending it for approval.</p>
					</div>
					<a class="btn btn-outline-secondary" href="/company/dashboard">Back</a>
				</div>

				<form method="POST">
					<div class="row g-3">
						<div class="col-12">
							<label class="form-label">Job Title</label>
							<input class="form-control" name="title" required>
						</div>
						<div class="col-12">
							<label class="form-label">Description</label>
							<textarea class="form-control" name="description" rows="4"></textarea>
						</div>
						<div class="col-md-7">
							<label class="form-label">Eligibility</label>
							<input class="form-control" name="eligibility">
						</div>
						<div class="col-md-5">
							<label class="form-label">Application Deadline</label>
							<input type="date" class="form-control" name="deadline">
						</div>
					</div>
					<div class="d-grid d-md-flex justify-content-md-end mt-4">
						<button class="btn btn-success px-4">Create Drive</button>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
